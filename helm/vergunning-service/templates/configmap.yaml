apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vergunning-service.fullname" . }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.config.SPRING_PROFILES_ACTIVE | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}
  DB_HOST: {{ .Values.postgres.host | quote }}
  DB_NAME: {{ .Values.postgres.database | quote }}
  KEYCLOAK_ISSUER_URI: {{ .Values.keycloak.issuerUri | quote }}
  KEYCLOAK_TOKEN_URI: {{ .Values.keycloak.tokenUri | quote }}
  OTEL_SERVICE_NAME: { { .Values.otel.serviceName | quote } }
  OTEL_EXPORTER_OTLP_ENDPOINT: { { .Values.otel.exporterEndpoint | quote } }
  OTEL_EXPORTER_OTLP_PROTOCOL: { { .Values.otel.exporterProtocol | quote } }
  OTEL_RESOURCE_ATTRIBUTES: { { .Values.otel.resourceAttributes | quote } }

