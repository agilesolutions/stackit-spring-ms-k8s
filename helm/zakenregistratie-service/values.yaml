replicaCount: 2

image:
  repository: ghcr.io/agilesolutions/zakenregistratie-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

  ingress:
    enabled: true
    className: nginx
    host: zakenregistratie.local

  resources:

    requests:
      cpu: 250m
      memory: 512Mi

    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpu: 70

  config:
    SPRING_PROFILES_ACTIVE: kubernetes
    LOG_LEVEL: INFO

  secret:
    POSTGRES_USERNAME: zakenregistratie
    POSTGRES_PASSWORD: zakenregistratie
    OAUTH_CLIENT_SECRET: test-secret

  postgres:
    host: postgres
    database: zakenregistratiedb

  keycloak:
    issuerUri: http://keycloak:8080/realms/overheid