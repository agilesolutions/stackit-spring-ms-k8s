replicaCount: 2

image:
  repository: ghcr.io/agilesolutions/zakenregistratie-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpu: 70

config:
  SPRING_PROFILES_ACTIVE: kubernetes
  LOG_LEVEL: INFO

postgres:
  host: postgres
  database: zakenregistratiedb
  username: postgresql

keycloak:
  issuerUri: http://keycloak:8080/realms/overheid