apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lgtm
  namespace: observability
spec:
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: lgtm-distributed
      version: "3.0.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:

    # --- Grafana ---
    grafana:

      enabled: true
      adminPassword: admin

      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.local

    # --- Loki (logs) ---
    loki:
      enabled: true
      deploymentMode: SingleBinary

      singleBinary:
        replicas: 1

    # --- Tempo (traces) ---
    tempo:
      enabled: true

      tempo:
        storage:
          trace:
            backend: local

    # --- Mimir (metrics backend) ---
    mimir:
      enabled: false   # disable for local POC (heavy)

    # --- Prometheus (metrics collection) ---
    prometheus:
      enabled: true

    # --- OpenTelemetry Gateway (optional) ---
    gateway:
      enabled: true

    # --- Resources tuned for Docker Desktop ---
    global:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

postRenderers:
  - name: kustomize
    config:
      patches:
        - target:
            kind: Deployment
            name: lgtm-grafana
          patch: |-
            spec:
              template:
                spec:
                  containers:
                    - name: grafana
                      startupProbe:
                        httpGet:
                          path: /api/health
                          port: 3000
                        initialDelaySeconds: 30
                        timeoutSeconds: 120
                        failureThreshold: 60
                        periodSeconds: 120