apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: loki
      version: "5.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    singleBinary:
      replicas: 1