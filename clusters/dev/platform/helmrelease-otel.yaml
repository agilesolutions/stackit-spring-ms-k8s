apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: observability
spec:
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.91.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system

  values:
    mode: deployment

    config:
      receivers:
        otlp:
          protocols:
            grpc:
            http:

      processors:
        batch:
        memory_limiter:
          check_interval: 1s
          limit_mib: 400
          spike_limit_mib: 100

      exporters:

        # --- TRACES → Tempo ---
        otlp/tempo:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true

        # --- METRICS → Prometheus ---
        prometheus:
          endpoint: "0.0.0.0:8889"

        # --- LOGS → Loki ---
        loki:
          endpoint: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

      service:
        pipelines:

          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/tempo]

          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [prometheus]

          logs:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [loki]

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi