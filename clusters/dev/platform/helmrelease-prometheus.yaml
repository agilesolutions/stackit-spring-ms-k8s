apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: observability
spec:
  interval: 5m
  install:
    createNamespace: true

  chart:
    spec:
      chart: prometheus
      version: "29.2.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system